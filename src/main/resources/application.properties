# Nome da aplicaçăo
spring.application.name=hotel

# Configuraçăo do servidor
server.port=8080

# Configuraçăo do banco de dados PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/hoteldb
spring.datasource.username=seu_usuario
spring.datasource.password=sua_senha
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuraçăo do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Configuraçăo do logging
logging.level.org.springframework=INFO
logging.level.com.senai.pablineeandre=DEBUG